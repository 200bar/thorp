# Patience rebalanced — fix the cooldown vs decay self-cancellation bug.
#
# Problem: cooldown_base 60s × loss_decay 180s = patience never blocks anything
# in practice (3 days of data confirm: 0 patience skips logged across 56 trades).
#
# Fix: stretch loss_decay to 600s (10min). Now after a loss, the next 10 minutes
# of cooldown actually count — and confidence threshold stays elevated.

name: patience-rebalanced
description: loss_decay 180→600s. Cooldown now actually blocks revenge trades within 10min.

coin: ETH
size_usdc: 10.0
take_profit: 0.08
stop_loss: 0.06
confidence_threshold: 70
ai_interval: 30.0

patience: true
cooldown_base: 60.0
loss_decay_seconds: 600.0   # was 180
confidence_bump: 5

max_session_losses: 4
extreme_skip_band: [0.20, 0.80]
executor: taker
